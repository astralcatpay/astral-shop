<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Astral Shop - Rôles Discord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">Astral<span>Shop</span></div>

  <nav class="nav">
    <a href="https://discord.gg/akEXaWzhFx" target="_blank">Discord</a>
  </nav>
</header>

<main>
  <section class="hero">
    <div class="hero-text">
      <h1>Rôles Discord Premium</h1>
      <p>Achète ton rôle instantanément via PayPal.</p>
    </div>
  </section>

  <section id="products" class="section">
    <h2>Rôle disponible</h2>

    <div class="products-grid">

      <!-- ⭐ RÔLE ROIS-MAGES (unique) -->
      <article class="product-card">
        <div class="product-image"></div>
        <h3>Rois-Mages ✨</h3>
        <p class="product-desc">
          Rôle modérateur prestigieux sur le serveur Astral Cat.  
          Entretien obligatoire avec un membre divin.
        </p>
        <div class="product-footer">
          <span class="price">20€</span>

          <!-- Lien PayPal auto-prix + redirection vers merci.html -->
          <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=lucas.mathieupro01@gmail.com&item_name=Rois-Mages%20%E2%9C%A8&amount=20&currency_code=EUR&return=merci.html" 
             class="btn-primary">
            Acheter
          </a>
        </div>
      </article>

      <!-- ⭐ POUR AJOUTER UN RÔLE : COPIE-COLLE CE BLOC
      <article class="product-card">
        <div class="product-image"></div>
        <h3>NOM DU RÔLE</h3>
        <p class="product-desc">Description du rôle.</p>
        <div class="product-footer">
          <span class="price">PRIX€</span>

          <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=lucas.mathieupro01@gmail.com&item_name=NOM_DU_ROLE&amount=PRIX&currency_code=EUR&return=merci.html" 
             class="btn-primary">
            Acheter
          </a>
        </div>
      </article>
      -->

    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
