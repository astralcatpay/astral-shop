<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Merci pour ton achat ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/jpg" href="image.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="gold-particles">
  <span style="left:10%; animation-delay:0s;"></span>
  <span style="left:30%; animation-delay:1s;"></span>
  <span style="left:50%; animation-delay:2s;"></span>
  <span style="left:70%; animation-delay:3s;"></span>
  <span style="left:90%; animation-delay:4s;"></span>
</div>

<div class="merci-wrapper">

  <div class="merci-box">
    <h1 class="merci-title gold-title-anim">Merci pour ton achat ✨</h1>

    <div class="merci-text-box">
      <p id="role-name">Chargement du rôle acheté...</p>
    </div>

    <div class="merci-text-box">
      <p>
        Ton soutien renforce le royaume Astral et permet au serveur de briller davantage.
      </p>
    </div>

    <div class="merci-text-box">
      <p>
        Pour obtenir ton rôle, ouvre un ticket et contacte un membre divin  
        en fournissant une preuve de paiement.
      </p>
    </div>

    <img id="role-image" src="roi_mage.jpg" alt="Rôle acheté" class="merci-img">

    <a class="btn-primary merci-btn" href="index.html">Retour à la boutique</a>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const role = params.get("role");

  const roleName = document.getElementById("role-name");
  const roleImage = document.getElementById("role-image");

  if (role === "roi_mage") {
    roleName.textContent = "Tu as acheté le rôle Rois‑Mages ✨";
    roleImage.src = "roi_mage.jpg";
  } else if (role === "chouchou") {
    roleName.textContent = "Tu as acheté le rôle 𝐿𝑒𝓈 𝒸𝒽𝑜𝓊𝒸𝒽𝑜𝓊𝓈 🧸";
    roleImage.src = "chouchou.jpg";
  } else if (role === "firstcat") {
    roleName.textContent = "Tu as acheté le rôle First Cat ①";
    roleImage.src = "first_cat.jpg";
  } else {
    roleName.textContent = "Rôle inconnu — vérifie ton achat.";
  }
</script>

<script src="script.js"></script>
</body>
</html>
